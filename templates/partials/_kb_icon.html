{% comment %}Geometric category icon (orange shape on a petrol tile). `key` = KennisbankCategorie.icon.{% endcomment %}{% if key == 'square-fill' %}<span style="width:14px;height:14px;background:var(--orange);border-radius:2px;display:block;"></span>{% elif key == 'triangle' %}<span style="width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:13px solid var(--orange);display:block;"></span>{% elif key == 'pill' %}<span style="width:16px;height:7px;background:var(--orange);border-radius:3px;display:block;"></span>{% elif key == 'diamond' %}<span style="width:12px;height:12px;background:var(--orange);border-radius:2px;transform:rotate(45deg);display:block;"></span>{% elif key == 'bars' %}<span style="width:15px;height:3px;background:var(--orange);box-shadow:0 5px 0 var(--orange),0 -5px 0 var(--orange);display:block;"></span>{% elif key == 'ring' %}<span style="width:13px;height:13px;border-radius:50%;border:2.5px solid var(--orange);display:block;"></span>{% else %}<span style="width:14px;height:14px;border:2.5px solid var(--orange);border-radius:3px;display:block;"></span>{% endif %}
